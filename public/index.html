<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Vitrine Online</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/imask"></script>
    
    <link rel="stylesheet" href="css/styles.css">
    <link rel="manifest" href="../manifest.json">
</head>
<body class="bg-slate-50 font-['Inter']">

    <div id="app">
        <div id="auth-screen" class="min-h-screen flex items-center justify-center p-4">
            <div class="w-full max-w-md bg-white rounded-3xl shadow-xl p-8 border border-slate-100">
                <div class="text-center mb-8">
                    <div class="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-indigo-200">
                        <i data-lucide="layout-dashboard" class="text-white w-8 h-8"></i>
                    </div>
                    <h1 class="text-2xl font-black text-slate-800 tracking-tight">Vitrine Online</h1>
                    <p class="text-slate-500 text-sm mt-1 font-medium">Gestão de Lojistas</p>
                </div>

                <form id="loginForm" class="space-y-5">
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-2">E-mail de Acesso</label>
                        <input type="email" id="loginEmail" required class="w-full bg-slate-50 border-none rounded-2xl px-5 py-4 text-sm focus:ring-2 focus:ring-indigo-500 transition-all font-medium" placeholder="seu@email.com">
                    </div>
                    
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-2">Palavra-passe</label>
                        <input type="password" id="loginPassword" required class="w-full bg-slate-50 border-none rounded-2xl px-5 py-4 text-sm focus:ring-2 focus:ring-indigo-500 transition-all font-medium" placeholder="••••••••">
                    </div>

                    <button type="submit" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold text-sm shadow-lg shadow-indigo-100 hover:bg-indigo-700 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                        Entrar no Painel
                        <i data-lucide="arrow-right" class="w-4 h-4"></i>
                    </button>
                </form>

                <div class="mt-8 pt-6 border-t border-slate-50 text-center">
                    <p class="text-slate-400 text-xs font-medium">Esqueceu-se do acesso? Contacte o administrador.</p>
                </div>
            </div>
        </div>

        <div id="dashboard-screen" class="hidden">
            </div>
    </div>

    <script type="module" src="js/app.js"></script>
    
    <script>
        // Inicializa ícones Lucide
        lucide.createIcons();
    </script>
</body>
</html>
