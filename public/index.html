<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Painel do Lojista | Gestão de Vitrine</title>
    
    <!-- Bibliotecas Externas Originais -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script src="https://unpkg.com/imask"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Configuração do Tailwind (Mantendo a paleta original) -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            DEFAULT: '#8b5cf6',
                            50: '#f5f3ff',
                            100: '#ede9fe',
                            400: '#a78bfa',
                            600: '#7c3aed',
                            700: '#6d28d9',
                        }
                    },
                    fontWeight: {
                        300: '300', 400: '400', 500: '500', 600: '600', 700: '700', 800: '800',
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-[#f8fafc] font-['Inter'] antialiased text-slate-900">

    <!-- ECRÃ DE AUTENTICAÇÃO -->
    <div id="auth-screen" class="min-h-screen flex items-center justify-center p-4 bg-slate-50">
        <div id="login-view" class="w-full max-w-[400px] bg-white rounded-[2.5rem] shadow-2xl shadow-slate-200/50 p-10 border border-slate-100 animate-fadeIn">
            <div class="text-center mb-10">
                <div class="w-20 h-20 bg-primary rounded-[2rem] flex items-center justify-center mx-auto mb-6 rotate-3 shadow-xl shadow-primary/20">
                    <i data-lucide="store" class="text-white w-10 h-10"></i>
                </div>
                <h1 class="text-3xl font-800 text-slate-900 tracking-tight">Painel Pro</h1>
                <p class="text-slate-400 font-500 mt-2">Faça login para gerir a sua loja</p>
            </div>
            
            <form onsubmit="window.handleLogin(event)" class="space-y-5">
                <div class="space-y-2">
                    <label class="block text-[11px] font-800 text-slate-500 uppercase tracking-[0.15em] ml-1">E-mail de Acesso</label>
                    <input type="email" id="login-email" required class="w-full px-5 py-4 bg-slate-50 border-2 border-slate-50 rounded-2xl focus:border-primary/20 focus:bg-white focus:ring-4 focus:ring-primary/5 outline-none transition-all font-600 text-sm" placeholder="exemplo@loja.pt">
                </div>
                <div class="space-y-2">
                    <label class="block text-[11px] font-800 text-slate-500 uppercase tracking-[0.15em] ml-1">Palavra-passe</label>
                    <div class="relative">
                        <input type="password" id="login-pass" required class="w-full px-5 py-4 bg-slate-50 border-2 border-slate-50 rounded-2xl focus:border-primary/20 focus:bg-white focus:ring-4 focus:ring-primary/5 outline-none transition-all font-600 text-sm" placeholder="••••••••">
                        <button type="button" onclick="window.togglePasswordVisibility('login-pass')" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-300 hover:text-primary transition-colors">
                            <i data-lucide="eye" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="w-full py-5 bg-primary hover:bg-primary-600 text-white rounded-[1.5rem] font-800 shadow-xl shadow-primary/20 hover:shadow-primary/30 transition-all flex items-center justify-center gap-3 active:scale-[0.98]">
                    Aceder ao Painel <i data-lucide="chevron-right" class="w-5 h-5"></i>
                </button>
            </form>
            
            <div class="mt-10 pt-8 border-t border-slate-50 text-center">
                <p class="text-sm font-600 text-slate-400">
                    Ainda não tem loja? <button onclick="window.toggleAuthView()" class="text-primary font-800 hover:underline underline-offset-4">Começar Agora</button>
                </p>
            </div>
        </div>

        <!-- Vista de Registo (Hidden por padrão) -->
        <div id="register-view" class="hidden w-full max-w-[400px] bg-white rounded-[2.5rem] shadow-2xl p-10 border border-slate-100 animate-fadeIn">
            <h2 class="text-2xl font-800 mb-6">Criar nova Loja</h2>
            <form onsubmit="window.handlePreRegister(event)" class="space-y-4">
                <input type="text" id="reg-store-name" placeholder="Nome da Loja" class="w-full px-5 py-4 bg-slate-50 border-2 border-slate-50 rounded-2xl outline-none text-sm font-600">
                <input type="email" id="reg-email" placeholder="E-mail" class="w-full px-5 py-4 bg-slate-50 border-2 border-slate-50 rounded-2xl outline-none text-sm font-600">
                <input type="password" id="reg-password" placeholder="Defina uma senha" class="w-full px-5 py-4 bg-slate-50 border-2 border-slate-50 rounded-2xl outline-none text-sm font-600">
                <button type="submit" class="w-full py-5 bg-slate-900 text-white rounded-[1.5rem] font-800">Criar Minha Vitrine</button>
            </form>
            <button onclick="window.toggleAuthView()" class="w-full mt-6 text-slate-400 text-xs font-700 uppercase tracking-widest">Voltar para Login</button>
        </div>
    </div>

    <!-- CONTEÚDO PRINCIPAL (APP) -->
    <div id="app-content" class="hidden min-h-screen flex flex-col md:flex-row">
        
        <!-- Sidebar Original -->
        <aside class="w-full md:w-72 bg-white border-r border-slate-100 flex flex-col z-40 relative">
            <div class="p-8">
                <div class="flex items-center gap-4 mb-10">
                    <div class="w-12 h-12 bg-primary rounded-2xl flex items-center justify-center shadow-lg shadow-primary/20 rotate-3">
                        <i data-lucide="layout-dashboard" class="text-white w-6 h-6"></i>
                    </div>
                    <div>
                        <span id="display-store-name" class="font-800 text-slate-900 text-lg block leading-tight">Painel Admin</span>
                        <div id="btn-status-loja" onclick="window.toggleLojaStatus()" class="cursor-pointer mt-1">
                            <!-- Injetado via JS: atualizarVisualBotaoStatus -->
                        </div>
                    </div>
                </div>

                <nav class="space-y-2">
                    <button id="nav-orders" onclick="window.changeTab('orders')" class="w-full flex items-center gap-4 px-5 py-4 rounded-2xl transition-all group">
                        <i data-lucide="shopping-cart" class="w-5 h-5"></i> <span>Pedidos</span>
                        <span id="badge-orders-new" class="ml-auto hidden w-5 h-5 bg-primary text-white text-[10px] rounded-full flex items-center justify-center animate-pulse">0</span>
                    </button>
                    <button id="nav-dashboard" onclick="window.changeTab('dashboard')" class="w-full flex items-center gap-4 px-5 py-4 rounded-2xl transition-all group">
                        <i data-lucide="bar-chart-3" class="w-5 h-5"></i> <span>Estatísticas</span>
                    </button>
                    <button id="nav-products" onclick="window.changeTab('products')" class="w-full flex items-center gap-4 px-5 py-4 rounded-2xl transition-all group">
                        <i data-lucide="package" class="w-5 h-5"></i> <span>Produtos</span>
                    </button>
                    <button id="nav-categories" onclick="window.changeTab('categories')" class="w-full flex items-center gap-4 px-5 py-4 rounded-2xl transition-all group text-slate-400">
                        <i data-lucide="layers" class="w-5 h-5"></i> <span>Categorias</span>
                    </button>
                    <button id="nav-banners" onclick="window.changeTab('banners')" class="w-full flex items-center gap-4 px-5 py-4 rounded-2xl transition-all group text-slate-400">
                        <i data-lucide="image" class="w-5 h-5"></i> <span>Banners</span>
                    </button>
                    <div class="h-px bg-slate-50 my-6"></div>
                    <button id="nav-config" onclick="window.changeTab('config')" class="w-full flex items-center gap-4 px-5 py-4 rounded-2xl transition-all group text-slate-400">
                        <i data-lucide="settings" class="w-5 h-5"></i> <span>Configuração</span>
                    </button>
                </nav>
            </div>

            <div class="mt-auto p-8 border-t border-slate-50">
                <button onclick="window.handleLogout()" class="w-full flex items-center gap-4 px-5 py-4 rounded-2xl text-red-500 hover:bg-red-50 transition-all font-700 text-sm">
                    <i data-lucide="log-out" class="w-5 h-5"></i> Sair do Sistema
                </button>
            </div>
        </aside>

        <!-- Área de Conteúdo Dinâmico -->
        <main class="flex-1 h-screen overflow-y-auto bg-slate-50/50 relative">
            
            <!-- SECÇÃO: PEDIDOS -->
            <section id="view-orders" class="p-4 md:p-10 space-y-8 animate-fadeIn">
                <div class="flex flex-col md:flex-row md:items-end justify-between gap-6">
                    <div>
                        <h2 class="text-3xl font-800 text-slate-900 tracking-tight">Gestão de Pedidos</h2>
                        <p class="text-slate-400 font-500 mt-1">Acompanhe as suas vendas em tempo real</p>
                    </div>
                    <div class="flex gap-3">
                        <button onclick="window.openManualOrderModal()" class="px-6 py-4 bg-slate-900 text-white rounded-2xl font-800 shadow-lg shadow-slate-200 flex items-center gap-2">
                            <i data-lucide="plus-circle" class="w-5 h-5"></i> Venda Manual
                        </button>
                    </div>
                </div>

                <div id="orders-container" class="grid gap-4">
                    <!-- Injetado via JS: renderOrdersList -->
                    <div class="animate-pulse flex flex-col gap-4">
                        <div class="h-24 bg-white rounded-3xl border border-slate-100"></div>
                        <div class="h-24 bg-white rounded-3xl border border-slate-100"></div>
                    </div>
                </div>
            </section>

            <!-- SECÇÃO: PRODUTOS -->
            <section id="view-products" class="hidden p-4 md:p-10 space-y-8 animate-fadeIn">
                <div class="flex justify-between items-center">
                    <h2 class="text-3xl font-800">Seus Produtos</h2>
                    <button onclick="window.openProductModal()" class="px-6 py-4 bg-primary text-white rounded-2xl font-800 flex items-center gap-2">
                        <i data-lucide="plus" class="w-5 h-5"></i> Novo Produto
                    </button>
                </div>
                <div id="products-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                    <!-- Injetado via JS: renderProductList -->
                </div>
            </section>

            <!-- SECÇÃO: DASHBOARD -->
            <section id="view-dashboard" class="hidden p-4 md:p-10 space-y-8 animate-fadeIn">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="bg-white p-8 rounded-[2rem] border border-slate-100 shadow-sm">
                        <p class="text-xs font-800 text-slate-400 uppercase tracking-widest mb-1">Visitas Totais</p>
                        <h3 id="dash-total-visits" class="text-4xl font-900 text-slate-900">0</h3>
                    </div>
                    <div class="bg-primary p-8 rounded-[2rem] shadow-xl shadow-primary/20 text-white">
                        <p class="text-xs font-800 text-white/60 uppercase tracking-widest mb-1">Faturamento (Mês)</p>
                        <h3 id="dash-month-revenue" class="text-4xl font-900 text-white">R$ 0,00</h3>
                    </div>
                    <div class="bg-white p-8 rounded-[2rem] border border-slate-100 shadow-sm">
                        <p class="text-xs font-800 text-slate-400 uppercase tracking-widest mb-1">Pedidos Concluídos</p>
                        <h3 id="dash-total-orders" class="text-4xl font-900 text-slate-900">0</h3>
                    </div>
                </div>
                <div class="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm">
                    <canvas id="mainChart" class="w-full max-h-[400px]"></canvas>
                </div>
            </section>

        </main>
    </div>

    <!-- MODAL DE PRODUTO INTEGRAL -->
    <div id="modal-produto" class="hidden fixed inset-0 z-50 bg-slate-900/40 backdrop-blur-md items-center justify-center p-4">
        <div class="bg-white w-full max-w-3xl rounded-[2.5rem] shadow-2xl overflow-hidden animate-scaleIn flex flex-col max-h-[90vh]">
            <div class="p-8 border-b border-slate-50 flex justify-between items-center bg-slate-50/50">
                <h3 id="modal-title" class="text-2xl font-900 tracking-tight">Gerir Produto</h3>
                <button onclick="document.getElementById('modal-produto').classList.add('hidden')" class="p-3 bg-white rounded-2xl hover:text-red-500 transition-colors shadow-sm">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
            
            <form id="form-produto" onsubmit="window.handleProductSubmit(event)" class="p-8 overflow-y-auto space-y-8">
                <input type="hidden" id="edit-id-produto">
                
                <!-- Nome e Preço -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-xs font-800 text-slate-400 uppercase tracking-widest ml-1">Nome do Item</label>
                        <input type="text" id="prod-name" required class="w-full px-5 py-4 bg-slate-50 border-2 border-slate-50 rounded-2xl focus:bg-white focus:border-primary/20 outline-none transition-all font-600">
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-800 text-slate-400 uppercase tracking-widest ml-1">Preço (R$)</label>
                        <input type="number" step="0.01" id="prod-price" required class="w-full px-5 py-4 bg-slate-50 border-2 border-slate-50 rounded-2xl focus:bg-white focus:border-primary/20 outline-none transition-all font-600">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-800 text-slate-400 uppercase tracking-widest ml-1">Categoria</label>
                    <select id="prod-category" class="w-full px-5 py-4 bg-slate-50 border-2 border-slate-50 rounded-2xl outline-none transition-all font-600">
                        <!-- Categorias injetadas via JS -->
                    </select>
                </div>

                <!-- Matriz de Variações original -->
                <div class="p-6 bg-slate-50 rounded-[2rem] border border-slate-100">
                    <h4 class="text-sm font-800 text-slate-900 mb-4 uppercase tracking-widest">Opções & Tamanhos</h4>
                    <div id="variations-container" class="space-y-3"></div>
                    <button type="button" onclick="window.addNewVariation()" class="mt-4 flex items-center gap-2 text-primary font-800 text-xs uppercase tracking-widest hover:opacity-70">
                        <i data-lucide="plus-circle" class="w-4 h-4"></i> Adicionar Opção
                    </button>
                </div>

                <button type="submit" class="w-full py-5 bg-primary text-white rounded-2xl font-900 shadow-xl shadow-primary/20 hover:scale-[1.01] transition-all">
                    Gravar Alterações
                </button>
            </form>
        </div>
    </div>

    <!-- SECÇÃO DE IMPRESSÃO TÉRMICA (ESCONDIDA) -->
    <div id="printSection" style="display: none;"></div>

    <!-- TOAST NOTIFICATION CONTAINER -->
    <div id="toast-container" class="fixed bottom-10 left-1/2 -translate-x-1/2 z-[100] flex flex-col gap-3"></div>

    <!-- SOM DE NOTIFICAÇÃO -->
    <audio id="notifSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <!-- JS MODULAR PRINCIPAL -->
    <!-- Nota: O caminho foi ajustado para garantir que o script de inicialização seja encontrado -->
    <script type="module" src="./js/app.js"></script>

    <style>
        @media print {
            body * { visibility: hidden; }
            #printSection, #printSection * { visibility: visible; }
            #printSection { position: absolute; left: 0; top: 0; }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fadeIn { animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .animate-scaleIn { animation: scaleIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    </style>
</body>
</html>
